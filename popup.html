<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Plus One Thing — History</title>
  <style>
    :root {
      --bg: #fafafa; --fg: #1a1a2e; --card: #ffffff; --border: #e0e0e0;
      --accent: #6c5ce7; --muted: #888; --danger: #ef4444;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a2e; --fg: #e0e0e0; --card: #16213e; --border: #2a2a4a;
        --accent: #a29bfe; --muted: #888; --danger: #ef4444;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--fg);
      min-width: 380px; padding: 1rem;
    }
    h1 { font-size: 1.1rem; margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.5rem; }
    .empty { color: var(--muted); font-size: 0.9rem; padding: 2rem; text-align: center; }
    .item {
      background: var(--card); border: 1px solid var(--border); border-radius: 8px;
      padding: 0.75rem; margin-bottom: 0.5rem;
    }
    .item.flagged { opacity: 0.5; }
    .item-header { display: flex; align-items: flex-start; gap: 0.5rem; }
    .type-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 1px; }
    .item-title {
      font-weight: 600; font-size: 0.9rem; flex: 1;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .item-title a { color: var(--accent); text-decoration: none; }
    .item-title a:hover { text-decoration: underline; }
    .item-meta {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 0.35rem; font-size: 0.75rem; color: var(--muted);
    }
    .item-url {
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      max-width: 220px;
    }
    .item-actions { display: flex; gap: 0.4rem; }
    .btn-tiny {
      background: none; border: 1px solid var(--border); border-radius: 4px;
      padding: 2px 6px; font-size: 0.7rem; cursor: pointer; color: var(--fg);
    }
    .btn-tiny:hover { background: var(--border); }
    .btn-tiny.delete { border-color: var(--danger); color: var(--danger); }
    .project-filter {
      margin-bottom: 0.75rem; display: flex; gap: 0.4rem; flex-wrap: wrap;
    }
    .project-chip {
      padding: 3px 10px; border-radius: 12px; font-size: 0.75rem;
      border: 1px solid var(--border); cursor: pointer; background: var(--card);
      color: var(--fg);
    }
    .project-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  </style>
</head>
<body>
  <h1>Plus One Thing History</h1>
  <div class="project-filter" id="projectFilter"></div>
  <div id="list"></div>

  <script src="popup.js"></script>
</body>
</html>
